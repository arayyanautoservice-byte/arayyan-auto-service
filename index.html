<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Rayyan Auto Service</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

.hero {
  padding: 60px 20px;
  text-align: center;
  background: linear-gradient(to right, #0f172a, #1e293b);
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  color: #94a3b8;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #22c55e;
  color: black;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.services, .products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  max-width: 300px;
  text-align: center;
}

footer {
  background: #020617;
  padding: 20px;
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>A RAYYAN AUTO SERVICE</header>

<section class="hero">
<h1>Solusi Service Mobil Terpercaya</h1>
<p>Melayani segala jenis perawatan mobil di Kediri</p>

<a href="https://wa.me/6281217340682" class="btn" target="_blank">
Hubungi Sekarang
</a>
</section>

<section class="section">
<h2>Jasa Kami</h2>
<div class="services">

<div class="card" onclick="openPopup('Tune Up', 'Mulai Rp150.000 - Mesin lebih halus & irit BBM')">Tune Up</div>

<div class="card" onclick="openPopup('Overhaul', 'Bongkar mesin total & perbaikan menyeluruh')">Overhaul</div>

<div class="card" onclick="openPopup('Understeel', 'Perbaikan kaki-kaki mobil agar nyaman')">Understeel</div>

<div class="card" onclick="openPopup('Ganti Aki', 'Pemasangan cepat + banyak pilihan aki')">Ganti Aki</div>

<div class="card" onclick="openPopup('Service Berkala', 'Perawatan rutin sesuai KM mobil')">Service Berkala</div>

<div class="card" onclick="openPopup('Diagnosa Scanner', 'Cek kerusakan mobil pakai alat modern')">Diagnosa Scanner</div>

</div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="popup-title"></h3>
    <p id="popup-text"></p>
    <br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<footer>
© 2026 A Rayyan Auto Service
</footer>

<script>
function openPopup(title, text) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popup-title").innerText = title;
  document.getElementById("popup-text").innerText = text;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
